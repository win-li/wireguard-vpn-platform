version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vpn-postgres
    restart: always
    environment:
      POSTGRES_USER: vpn_admin
      POSTGRES_PASSWORD: vpn_secure_password_2024
      POSTGRES_DB: vpn_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_admin -d vpn_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    restart: always
    command: redis-server --requirepass vpn_redis_password_2024
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://vpn_admin:vpn_secure_password_2024@postgres:5432/vpn_system
      - REDIS_URL=redis://:vpn_redis_password_2024@redis:6379/0
      - JWT_SECRET=your_jwt_secret_key_change_in_production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASSWORD=your_app_password
      - STRIPE_API_KEY=sk_test_your_stripe_key
      - ALIPAY_APP_ID=your_alipay_app_id
      - ALIPAY_PRIVATE_KEY_PATH=/app/keys/alipay_private.pem
    volumes:
      - ./backend:/app
      - ./keys:/app/keys
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpn-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vpn-network

  # Admin Dashboard
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: vpn-admin
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - vpn-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vpn-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - admin
    networks:
      - vpn-network

  # WireGuard Node Agent (optional - for each VPN node)
  wireguard-agent:
    image: linuxserver/wireguard:latest
    container_name: vpn-wireguard
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=vpn.yourdomain.com
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
    volumes:
      - ./wireguard/config:/config
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - vpn-network

volumes:
  postgres_data:
  redis_data:

networks:
  vpn-network:
    driver: bridge
